<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Speedroads</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:   #07070f; --surf: #0f0f1e; --panel: #13132a;
      --brd:  #1e1e3c; --brd2: #2a2a4a;
      --acc:  #00e5ff; --acc2: #006680;
      --ora:  #ff6b2b; --grn:  #00ff88; --red: #ff4060; --pur: #bb86fc;
      --txt:  #d4d4f0; --mute: #50507a; --r: 5px;
    }
    body { width:420px; background:var(--bg); color:var(--txt); font:12.5px/1.45 'Segoe UI',system-ui,sans-serif; user-select:none; }

    header { display:flex; align-items:center; justify-content:space-between; padding:10px 14px 8px; background:var(--surf); border-bottom:1px solid var(--brd); }
    .logo { font-size:15px; font-weight:900; letter-spacing:4px; color:var(--acc); text-shadow:0 0 20px rgba(0,229,255,.3); }
    .logo em { color:var(--ora); font-style:normal; }
    header small { color:var(--mute); font-size:10px; }

    #status { display:flex; align-items:center; gap:7px; padding:5px 14px; font-size:11px; background:var(--panel); border-bottom:1px solid var(--brd); min-height:26px; color:var(--mute); }
    #status::before { content:''; width:6px; height:6px; border-radius:50%; background:var(--mute); flex-shrink:0; }
    #status.ok   { color:var(--grn); } #status.ok::before   { background:var(--grn); box-shadow:0 0 5px var(--grn); }
    #status.err  { color:var(--red); } #status.err::before  { background:var(--red); }
    #status.warn { color:var(--ora); } #status.warn::before { background:var(--ora); }

    /* Section title inline */
    .sec-hdr { display:flex; align-items:center; gap:8px; margin-bottom:7px; font-size:9px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:var(--acc); }
    .sec-hdr::after { content:''; flex:1; height:1px; background:var(--brd2); }

    /* ── Vitesse ── */
    .speed-box { padding:8px 14px 10px; background:var(--surf); border-bottom:1px solid var(--brd); }
    .spd-presets { display:flex; gap:4px; margin-bottom:7px; }
    .spd-btn { flex:1; height:24px; border:1px solid var(--brd2); border-radius:var(--r); background:var(--panel); color:var(--mute); font:700 11px/1 'Consolas',monospace; cursor:pointer; transition:color .1s,border-color .1s,background .1s; }
    .spd-btn:hover { color:var(--acc); border-color:var(--acc2); }
    .spd-btn.active { color:var(--bg); background:var(--acc); border-color:var(--acc); }
    .spd-row { display:flex; align-items:center; gap:8px; }
    .spd-row small { font-size:10.5px; color:var(--mute); white-space:nowrap; }

    /* ── Mode ── */
    .mode-box { padding:7px 14px 9px; background:var(--surf); border-bottom:1px solid var(--brd); }
    .mode-btns { display:flex; gap:5px; }
    .mode-btn { flex:1; height:28px; border:1px solid var(--brd2); border-radius:var(--r); background:var(--panel); color:var(--mute); font:700 10.5px/1 'Segoe UI',sans-serif; cursor:pointer; transition:all .15s; }
    .mode-btn:hover { color:var(--txt); border-color:var(--acc2); }
    .mode-btn.m-normal { color:var(--grn);  border-color:var(--grn);  background:rgba(0,255,136,.08); }
    .mode-btn.m-grip   { color:var(--acc);  border-color:var(--acc);  background:rgba(0,229,255,.08); }
    .mode-btn.m-drift  { color:var(--ora);  border-color:var(--ora);  background:rgba(255,107,43,.08); }
    .mode-btn.m-vol    { color:var(--pur);  border-color:var(--pur);  background:rgba(187,134,252,.08); }

    /* Progressive start */
    .prog-wrap { display:flex; align-items:center; gap:7px; margin-top:7px; padding:5px 8px; background:var(--panel); border:1px solid var(--brd2); border-radius:var(--r); cursor:pointer; transition:border-color .15s; }
    .prog-wrap:hover { border-color:var(--acc2); }
    .prog-wrap.on { border-color:var(--ora); }
    .prog-wrap input[type=checkbox] { accent-color:var(--acc); cursor:pointer; flex-shrink:0; }
    .prog-wrap span { font-size:10.5px; color:var(--mute); line-height:1.3; }
    .prog-wrap.on span { color:var(--ora); }

    /* ── Tabs ── */
    .tabs { display:flex; background:var(--surf); border-bottom:1px solid var(--brd); }
    .tab { flex:1; padding:6px; text-align:center; font-size:11px; font-weight:700; letter-spacing:.5px; text-transform:uppercase; color:var(--mute); cursor:pointer; border-bottom:2px solid transparent; transition:color .15s,border-color .15s; }
    .tab:hover { color:var(--txt); }
    .tab.active { color:var(--acc); border-bottom-color:var(--acc); }

    .panel { display:none; }
    .panel.active { display:block; }

    /* ── Stats ── */
    #pStats { max-height:210px; overflow-y:auto; padding:2px 0; scrollbar-width:thin; scrollbar-color:var(--brd2) transparent; }
    #pStats::-webkit-scrollbar { width:4px; }
    #pStats::-webkit-scrollbar-thumb { background:var(--brd2); border-radius:2px; }

    .section { display:flex; align-items:center; gap:8px; padding:5px 14px 3px; font-size:9px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:var(--acc); }
    .section::after { content:''; flex:1; height:1px; background:var(--brd); }

    .row { display:flex; align-items:center; gap:8px; padding:2px 14px; }
    .row:hover { background:rgba(255,255,255,.018); }
    .row label { flex:1; font-size:11.5px; color:var(--txt); cursor:default; overflow:hidden; }
    .row label small { display:block; font-size:9px; color:var(--mute); margin-top:1px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

    .inp-wrap { display:flex; align-items:center; border:1px solid var(--brd); border-radius:var(--r); overflow:hidden; background:var(--panel); transition:border-color .15s; }
    .inp-wrap:focus-within { border-color:var(--acc2); }
    .inp-wrap.changed { border-color:var(--grn); }
    .inp-wrap.changed input { color:var(--grn); }
    .inp-wrap button { width:22px; height:26px; border:none; background:transparent; color:var(--mute); font-size:14px; cursor:pointer; transition:color .1s,background .1s; }
    .inp-wrap button:hover { color:var(--txt); background:rgba(255,255,255,.07); }
    .inp-wrap input[type=number] { width:68px; height:26px; border:none; background:transparent; color:var(--txt); font:11.5px/1 'Consolas',monospace; text-align:center; outline:none; -moz-appearance:textfield; }
    .inp-wrap input::-webkit-inner-spin-button,
    .inp-wrap input::-webkit-outer-spin-button { -webkit-appearance:none; }

    /* ── Logs ── */
    #pLogs { display:none; flex-direction:column; height:210px; }
    #pLogs.active { display:flex; }
    #logList { flex:1; overflow-y:auto; padding:5px 10px; font:10.5px/1.5 'Consolas','Courier New',monospace; scrollbar-width:thin; scrollbar-color:var(--brd2) transparent; }
    #logList::-webkit-scrollbar { width:4px; }
    #logList::-webkit-scrollbar-thumb { background:var(--brd2); border-radius:2px; }
    .log-entry { display:flex; gap:6px; padding:1px 0; border-bottom:1px solid rgba(255,255,255,.03); word-break:break-all; }
    .log-ts  { color:var(--mute); flex-shrink:0; min-width:52px; }
    .log-msg { flex:1; color:var(--txt); }
    .log-entry.ok    .log-msg { color:var(--grn); }
    .log-entry.error .log-msg { color:var(--red); }
    .log-entry.warn  .log-msg { color:var(--ora); }

    .log-toolbar { display:flex; gap:5px; padding:5px 10px; background:var(--surf); border-top:1px solid var(--brd); }
    .log-toolbar button { flex:1; height:25px; border:1px solid var(--brd2); border-radius:var(--r); background:var(--panel); color:var(--mute); font-size:10.5px; cursor:pointer; transition:color .1s,border-color .1s; }
    .log-toolbar button:hover { color:var(--txt); border-color:var(--acc2); }
    #btnCopyLogs:hover { color:var(--grn); border-color:var(--grn); }

    /* ── Actions ── */
    .actions { display:grid; grid-template-columns:1fr 1fr 42px; gap:6px; padding:7px 14px 9px; background:var(--surf); border-top:1px solid var(--brd); }
    .btn { height:32px; border:none; border-radius:var(--r); cursor:pointer; font:700 11.5px/1 'Segoe UI',sans-serif; letter-spacing:.3px; display:flex; align-items:center; justify-content:center; gap:4px; transition:opacity .15s,transform .1s; }
    .btn:hover  { opacity:.82; }
    .btn:active { transform:scale(.97); }
    .btn-live   { background:linear-gradient(135deg,#00c8ff,#00e5ff); color:#000; }
    .btn-reload { background:linear-gradient(135deg,#ff6b2b,#ff9800); color:#000; }
    .btn-reset  { background:var(--panel); color:var(--mute); border:1px solid var(--brd); font-size:15px; }
    .btn-reset:hover { color:var(--red); border-color:var(--red); }
  </style>
</head>
<body>

<header>
  <div class="logo">SPEED<em>ROADS</em></div>
  <small>v5.1 · Math-safe</small>
</header>

<div id="status">Initialisation…</div>

<!-- Vitesse -->
<div class="speed-box">
  <div class="sec-hdr">⚡ Vitesse</div>
  <div class="spd-presets">
    <button class="spd-btn" data-v="1">×1</button>
    <button class="spd-btn" data-v="2">×2</button>
    <button class="spd-btn" data-v="5">×5</button>
    <button class="spd-btn" data-v="10">×10</button>
    <button class="spd-btn" data-v="25">×25</button>
    <button class="spd-btn" data-v="50">×50</button>
  </div>
  <div class="spd-row">
    <div class="inp-wrap" id="spdWrap">
      <button id="spdMinus" type="button">−</button>
      <input type="number" id="spdInput" min="0.1" max="50" step="0.5" value="1">
      <button id="spdPlus" type="button">+</button>
    </div>
    <small>× multiplicateur de vitesse</small>
  </div>
  <label class="prog-wrap" id="progWrap">
    <input type="checkbox" id="chkProg">
    <span>⏱ <strong>Démarrage progressif</strong> — map charge à ×1 pendant 8 s, puis vitesse réelle</span>
  </label>
</div>

<!-- Mode -->
<div class="mode-box">
  <div class="sec-hdr">Mode</div>
  <div class="mode-btns">
    <button class="mode-btn" id="modeNormal" title="Valeurs d'origine du jeu">🛣 Normal</button>
    <button class="mode-btn" id="modeGrip"   title="Grip maximum — aucun dérapage">🏎 Grip</button>
    <button class="mode-btn" id="modeDrift"  title="Pneus glissants — dérapages faciles">💨 Drift</button>
    <button class="mode-btn" id="modeVol"    title="Friction quasi nulle — glisse librement">✈ Vol</button>
  </div>
</div>

<!-- Tabs -->
<div class="tabs">
  <div class="tab active" data-tab="pStats">⚙ Avancé</div>
  <div class="tab"        data-tab="pLogs"> 🔍 Logs</div>
</div>

<div id="pStats" class="panel active"></div>

<div id="pLogs" class="panel">
  <div id="logList"></div>
  <div class="log-toolbar">
    <button id="btnRefreshLogs">↺ Rafraîchir</button>
    <button id="btnScan">🔍 Scan</button>
    <button id="btnScanReport">📊 Rapport</button>
    <button id="btnCopyLogs">⎘ Copier</button>
  </div>
</div>

<div class="actions">
  <button class="btn btn-live"   id="btnLive"   title="Sauvegarde et recharge le jeu">💾 Appliquer</button>
  <button class="btn btn-reload" id="btnReload" title="Valeurs par défaut + reload">↺ Défauts</button>
  <button class="btn btn-reset"  id="btnReset"  title="Relire sans recharger">⟳</button>
</div>

<script src="popup.js"></script>
</body>
</html>
